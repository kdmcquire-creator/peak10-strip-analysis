# ─── Peak 10 Energy — Strip Analysis Tool ─────────────────────
# Netlify configuration
# Deploy: connect this repo in Netlify → auto-deploys on every push to main

[build]
  publish = "public"
  # No build command needed — pure static HTML

# ─── Security & performance headers ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    # Cache HTML short; assets can be long
    Cache-Control             = "public, max-age=300, stale-while-revalidate=60"

# Long-cache for versioned static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Redirects ────────────────────────────────────────────────
# SPA fallback (not strictly needed for single-page, but future-proofs routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
